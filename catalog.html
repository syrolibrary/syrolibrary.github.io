<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Book Catalog — Syro Library</title>
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/components.css" />

  <style>
    /* ── Catalog header ───────────────────────────────────────────────────── */
    .catalog-header {
      background: var(--color-white);
      border-bottom: 1px solid var(--color-gray-200);
      padding: 0 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 56px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .catalog-brand { font-size: 1.0625rem; font-weight: 700; color: var(--color-gray-900); }
    .catalog-brand span { color: var(--color-primary); }


    /* ── Category tabs ────────────────────────────────────────────────────── */
    .category-tabs {
      display: flex;
      gap: 0;
      border-bottom: 2px solid var(--color-gray-200);
      margin-top: 1rem;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .category-tabs::-webkit-scrollbar { display: none; }
    .category-tab {
      padding: 0.5rem 1.125rem;
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--color-gray-500);
      cursor: pointer;
      border: none;
      background: none;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      white-space: nowrap;
      transition: color 0.15s;
    }
    .category-tab:hover { color: var(--color-gray-800); }
    .category-tab.active {
      color: var(--color-primary);
      border-bottom-color: var(--color-primary);
      font-weight: 600;
    }
    .category-tab-count {
      font-size: 0.75rem;
      opacity: 0.65;
      margin-left: 0.3rem;
    }

    /* ── Label filter bar ─────────────────────────────────────────────────── */
    .label-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 0.375rem;
      margin: 0.75rem 0 0;
    }
    .label-pill {
      display: inline-block;
      padding: 0.25rem 0.75rem;
      border-radius: 9999px;
      font-size: 0.8125rem;
      cursor: pointer;
      border: 1px solid var(--color-gray-300);
      background: var(--color-white);
      color: var(--color-gray-600);
      transition: background 0.1s, color 0.1s, border-color 0.1s;
      user-select: none;
    }
    .label-pill:hover  { border-color: var(--color-primary); color: var(--color-primary); }
    .label-pill.active { background: var(--color-primary); border-color: var(--color-primary); color: #fff; }

    /* ── Results bar ──────────────────────────────────────────────────────── */
    .results-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 1rem 0 0.75rem;
      font-size: 0.875rem;
      color: var(--color-gray-500);
    }
    .view-toggle { display: flex; gap: 0.25rem; }
    .view-toggle button {
      background: none;
      border: 1px solid var(--color-gray-300);
      border-radius: var(--radius-sm);
      padding: 0.3rem 0.5rem;
      cursor: pointer;
      color: var(--color-gray-400);
      line-height: 1;
      transition: background 0.1s, color 0.1s;
    }
    .view-toggle button.active {
      background: var(--color-gray-100);
      color: var(--color-gray-700);
      border-color: var(--color-gray-400);
    }

    /* ── Card grid ────────────────────────────────────────────────────────── */
    .book-grid-catalog {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(155px, 1fr));
      gap: 1.25rem;
    }
    .book-card-catalog {
      background: var(--color-white);
      border: 1px solid var(--color-gray-200);
      border-radius: var(--radius-md);
      overflow: hidden;
      transition: box-shadow 0.15s, border-color 0.15s;
      cursor: pointer;
    }
    .book-card-catalog:hover { box-shadow: var(--shadow-md); border-color: var(--color-gray-300); }

    /* ── Book cover ───────────────────────────────────────────────────────── */
    .book-cover {
      width: 100%; aspect-ratio: 2/3; position: relative;
      display: flex; align-items: center; justify-content: center; overflow: hidden;
    }
    .book-cover img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; }
    .book-cover-initial { font-size: 3rem; font-weight: 800; color: rgba(255,255,255,0.75); user-select: none; line-height: 1; }

    /* ── Card body ────────────────────────────────────────────────────────── */
    .book-card-body { padding: 0.75rem; display: flex; flex-direction: column; gap: 0.25rem; }
    .book-card-title {
      font-weight: 600; font-size: 0.875rem; line-height: 1.35; color: var(--color-gray-900);
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .book-card-author {
      font-size: 0.8rem; color: var(--color-gray-500);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 0.1rem;
    }
    .card-labels { display: flex; flex-wrap: wrap; gap: 0.25rem; margin: 0.2rem 0 0.25rem; }
    .card-label {
      font-size: 0.7rem; padding: 0.1rem 0.45rem;
      background: var(--color-gray-100); border: 1px solid var(--color-gray-200);
      border-radius: 9999px; color: var(--color-gray-500); white-space: nowrap;
    }

    /* ── List view ────────────────────────────────────────────────────────── */
    .book-list-catalog { display: flex; flex-direction: column; gap: 0.5rem; }
    .book-row-catalog {
      display: flex; align-items: center; gap: 0.875rem;
      background: var(--color-white); border: 1px solid var(--color-gray-200);
      border-radius: var(--radius-md); padding: 0.625rem 0.875rem;
      cursor: pointer; transition: box-shadow 0.15s, border-color 0.15s;
    }
    .book-row-catalog:hover { box-shadow: var(--shadow-md); border-color: var(--color-gray-300); }
    .book-row-thumb {
      flex-shrink: 0; width: 36px; height: 54px; border-radius: 3px;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden; position: relative; font-size: 1.2rem;
      font-weight: 800; color: rgba(255,255,255,0.8);
    }
    .book-row-thumb img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
    .book-row-info { flex: 1; min-width: 0; }
    .book-row-title { font-weight: 600; font-size: 0.9rem; color: var(--color-gray-900); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .book-row-author { font-size: 0.8rem; color: var(--color-gray-500); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 0.2rem; }
    .book-row-right { flex-shrink: 0; display: flex; flex-direction: column; align-items: flex-end; gap: 0.375rem; }

    /* ── Responsive ───────────────────────────────────────────────────────── */
    @media (max-width: 480px) {
      .book-grid-catalog { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 0.75rem; }
      .book-cover-initial { font-size: 2.25rem; }
      .catalog-header { padding: 0 1rem; }
    }
  </style>

  <script type="importmap">
  {
    "imports": {
      "firebase/app":       "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js",
      "firebase/auth":      "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js",
      "firebase/firestore": "https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js"
    }
  }
  </script>
</head>
<body>

<!-- ── Catalog header (always visible) ────────────────────────────────────── -->
<header id="catalog-header" class="catalog-header">
  <div>
    <div class="catalog-brand">Syro <span>Library</span></div>
    <div style="font-size:0.75rem; color:var(--color-gray-500); margin-top:0.1rem;">
      St. Thomas Syro Malabar Church, Fremont
    </div>
  </div>
  <a id="staff-btn" href="login.html" class="btn btn-primary btn-sm" style="font-size:0.8125rem;">
    Staff login
  </a>
</header>

<!-- ── Staff nav (visible when logged in — identical structure to other pages) -->
<nav id="staff-nav" class="nav" hidden>
  <span class="nav-brand">Syro Library</span>
  <a href="catalog.html"    class="nav-link active">Catalog</a>
  <a href="students.html"   class="nav-link admin-only" hidden>Students</a>
  <a href="books.html"      class="nav-link admin-only" hidden>Manage Books</a>
  <a href="volunteers.html" class="nav-link admin-only" hidden>Volunteers</a>
  <div class="nav-divider"></div>
  <span class="nav-user" id="nav-user"></span>
  <button id="signout-btn" class="btn btn-ghost btn-sm" type="button">Sign out</button>
</nav>

<!-- ── Content ────────────────────────────────────────────────────────────── -->
<div class="page-content">

  <div class="search-bar" style="margin-top:1rem;">
    <input
      type="search"
      id="search-input"
      class="search-input"
      placeholder="Search by title or author…"
      autocomplete="off"
    />
  </div>

  <!-- Category tabs -->
  <div id="category-tabs" class="category-tabs" hidden></div>

  <!-- Label filter pills -->
  <div id="label-bar" class="label-bar" hidden></div>

  <!-- Loading -->
  <div id="loading" class="page-loading">
    <span class="spinner"></span>
    <span>Loading books…</span>
  </div>

  <!-- Results bar -->
  <div id="results-bar" class="results-bar" hidden>
    <span id="count"></span>
    <div class="view-toggle">
      <button id="view-grid" class="active" title="Card view" aria-label="Card view">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
          <rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
        </svg>
      </button>
      <button id="view-list" title="List view" aria-label="List view">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/>
          <circle cx="3" cy="6" r="1.5" fill="currentColor" stroke="none"/>
          <circle cx="3" cy="12" r="1.5" fill="currentColor" stroke="none"/>
          <circle cx="3" cy="18" r="1.5" fill="currentColor" stroke="none"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Book container -->
  <div id="book-container" hidden></div>

  <!-- Empty state -->
  <div class="empty-state hidden" id="empty">
    <p class="empty-state-title">No books found</p>
    <p>Try a different search term or label.</p>
  </div>

</div>

<!-- ── Book Detail Modal ──────────────────────────────────────────────────── -->
<div id="detail-modal" class="modal-overlay" hidden>
  <div class="modal" style="max-width:540px">

    <div class="modal-header">
      <h2 class="modal-title" id="dm-title"></h2>
      <button class="modal-close" id="dm-close" aria-label="Close">&#x2715;</button>
    </div>

    <div class="modal-body">
      <div style="display:flex; gap:1.25rem; align-items:flex-start;">
        <!-- Cover -->
        <div id="dm-cover" style="flex-shrink:0; width:100px; border-radius:var(--radius-sm);
                                   overflow:hidden; aspect-ratio:2/3; position:relative;
                                   display:flex; align-items:center; justify-content:center;"></div>
        <!-- Info -->
        <div style="flex:1; min-width:0;">
          <div id="dm-author"  style="font-size:0.9375rem; color:var(--color-gray-600); margin-bottom:0.5rem;"></div>
          <div id="dm-badge"   style="margin-bottom:0.75rem;"></div>
          <div id="dm-isbn"    style="font-size:0.8125rem; color:var(--color-gray-500); margin-bottom:0.75rem;"></div>
          <div id="dm-labels"  style="display:flex; flex-wrap:wrap; gap:0.375rem; margin-bottom:0.75rem;"></div>
          <div id="dm-summary" style="font-size:0.875rem; color:var(--color-gray-700); line-height:1.6; white-space:pre-wrap;"></div>
        </div>
      </div>

      <!-- Active checkouts (staff only) -->
      <div id="dm-checkouts" hidden></div>
    </div>

    <!-- Footer with checkout button (staff only) -->
    <div id="dm-footer" class="modal-footer" hidden>
      <button id="dm-checkout-btn" class="btn btn-primary">Check Out</button>
    </div>

  </div>
</div>

<!-- ── Checkout Modal (staff only) ───────────────────────────────────────── -->
<div id="checkout-modal" class="modal-overlay" hidden>
  <div class="modal">

    <div class="modal-header">
      <h2 class="modal-title">Check Out</h2>
      <button class="modal-close" id="cm-close" aria-label="Close">&#x2715;</button>
    </div>

    <div class="modal-body">
      <p id="cm-book-name" style="font-weight:600; margin-bottom:1.25rem;"></p>

      <div class="form-group">
        <label class="form-label" for="cm-student-input">Student</label>
        <div class="typeahead-wrapper">
          <input id="cm-student-input" class="form-input"
                 placeholder="Type student name…" autocomplete="off" />
          <div id="cm-student-dropdown" class="typeahead-dropdown" hidden></div>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="cm-due-date">Due Date</label>
        <input id="cm-due-date" type="date" class="form-input" />
        <p class="form-hint">Default is 14 days from today.</p>
      </div>

      <p id="cm-error" class="text-danger mt-2" hidden></p>
    </div>

    <div class="modal-footer">
      <button id="cm-cancel"  class="btn btn-ghost">Cancel</button>
      <button id="cm-confirm" class="btn btn-primary">Confirm Checkout</button>
    </div>

  </div>
</div>

<script type="module">
import { subscribeToBooks, filterBooks }                      from './js/books.js';
import { escHtml, openModal, closeModal,
         initModalDismiss, showToast, formatDate }            from './js/ui.js';
import { initAuth, signOutUser }                              from './js/auth.js';
import { loadStudents, searchStudents }                       from './js/students.js';
import { getActiveCheckoutsForBook, checkoutBook,
         checkinBook, getOverdueStatus }                      from './js/checkouts.js';
import { Timestamp }                                          from 'firebase/firestore';

// ── Cover helpers ─────────────────────────────────────────────────────────────
const COLORS = [
  '#1a56db','#057a55','#c27803','#7e3af2',
  '#0369a1','#be185d','#047857','#b45309',
  '#dc2626','#0891b2',
];
function placeholderColor(title) {
  let h = 0;
  for (const c of (title || '')) h = ((h << 5) - h + c.charCodeAt(0)) | 0;
  return COLORS[Math.abs(h) % COLORS.length];
}
function coverImgTag(book, size = 'M', loading = 'lazy') {
  const src = book.imageUrl
    || (book.isbn ? `https://covers.openlibrary.org/b/isbn/${encodeURIComponent(book.isbn)}-${size}.jpg` : '');
  if (!src) return '';
  return `<img src="${escHtml(src)}" alt="${escHtml(book.title)}" loading="${loading}" onerror="this.remove()" />`;
}

// ── State ─────────────────────────────────────────────────────────────────────
let _allBooks        = [];
let _activeCategory  = null;  // null = All
let _activeLabel     = null;
let _viewMode        = 'grid';
let _staffUser     = null;
let _currentBook   = null;
let _selectedStudent = null;
let _typeaheadHits   = [];

// ── Auth — non-blocking: public users see catalog, staff get extra UI ─────────
initAuth({
  onAuthorized: async (user) => {
    _staffUser = user;
    document.getElementById('catalog-header').hidden = true;
    document.getElementById('staff-nav').hidden       = false;
    document.getElementById('nav-user').innerHTML =
      `${escHtml(user.name || user.email)} <span class="badge ${user.role === 'admin' ? 'badge-admin' : 'badge-volunteer'}">${user.role}</span>`;
    if (user.role === 'admin') {
      document.querySelectorAll('.admin-only').forEach(el => el.hidden = false);
    }
    document.getElementById('signout-btn').addEventListener('click', signOutUser);
    await loadStudents();
    render(); // re-render cards with checkout buttons
  },
  onUnauthorized: () => {
    _staffUser = null;
    // Public view — books already loading via subscribeToBooks below
  },
});

// ── Subscribe ─────────────────────────────────────────────────────────────────
subscribeToBooks((books) => {
  _allBooks = books;
  renderCategoryTabs();
  renderLabelBar();
  render();
  document.getElementById('loading').hidden        = true;
  document.getElementById('results-bar').hidden    = false;
  document.getElementById('book-container').hidden = false;

  // Refresh detail modal if open
  if (_currentBook && !document.getElementById('detail-modal').hidden) {
    const fresh = books.find(b => b.id === _currentBook.id);
    if (fresh) { _currentBook = fresh; populateDetailModal(fresh); }
  }
});

// ── Search ────────────────────────────────────────────────────────────────────
document.getElementById('search-input').addEventListener('input', render);

// ── View toggle ───────────────────────────────────────────────────────────────
document.getElementById('view-grid').addEventListener('click', () => setView('grid'));
document.getElementById('view-list').addEventListener('click', () => setView('list'));

function setView(mode) {
  _viewMode = mode;
  document.getElementById('view-grid').classList.toggle('active', mode === 'grid');
  document.getElementById('view-list').classList.toggle('active', mode === 'list');
  render();
}

// ── Filtered list ─────────────────────────────────────────────────────────────
function getFiltered() {
  let books = filterBooks(_allBooks, document.getElementById('search-input').value.trim());
  if (_activeCategory) books = books.filter(b => b.category === _activeCategory);
  if (_activeLabel)    books = books.filter(b => Array.isArray(b.labels) && b.labels.includes(_activeLabel));
  return books;
}

// ── Category tabs ─────────────────────────────────────────────────────────────
function renderCategoryTabs() {
  const cats = [...new Set(_allBooks.map(b => b.category).filter(Boolean))].sort();
  const bar  = document.getElementById('category-tabs');
  if (!cats.length) { bar.hidden = true; return; }

  bar.hidden = false;
  const allCount = _allBooks.length;
  bar.innerHTML = [{ key: null, label: 'All', count: allCount },
    ...cats.map(c => ({ key: c, label: c, count: _allBooks.filter(b => b.category === c).length }))
  ].map(({ key, label, count }) => `
    <button class="category-tab${_activeCategory === key ? ' active' : ''}"
            data-cat="${escHtml(key ?? '')}">
      ${escHtml(label)}<span class="category-tab-count">${count}</span>
    </button>`).join('');
}

document.getElementById('category-tabs').addEventListener('click', (e) => {
  const tab = e.target.closest('.category-tab');
  if (!tab) return;
  _activeCategory = tab.dataset.cat || null;
  _activeLabel    = null; // reset label filter when switching category
  renderCategoryTabs();
  renderLabelBar();
  render();
});

// ── Label bar ─────────────────────────────────────────────────────────────────
function renderLabelBar() {
  const scope     = _activeCategory ? _allBooks.filter(b => b.category === _activeCategory) : _allBooks;
  const allLabels = [...new Set(scope.flatMap(b => b.labels ?? []))].sort();
  const bar = document.getElementById('label-bar');
  if (!allLabels.length) { bar.hidden = true; return; }
  bar.hidden = false;
  bar.innerHTML = ['All', ...allLabels].map(l => `
    <button class="label-pill${(l === 'All' ? !_activeLabel : _activeLabel === l) ? ' active' : ''}"
            data-label="${l === 'All' ? '' : escHtml(l)}">${escHtml(l)}</button>`).join('');
}

document.getElementById('label-bar').addEventListener('click', (e) => {
  const pill = e.target.closest('.label-pill');
  if (!pill) return;
  _activeLabel = pill.dataset.label || null;
  renderLabelBar();
  render();
});

// ── Render ────────────────────────────────────────────────────────────────────
function render() {
  const books     = getFiltered();
  const container = document.getElementById('book-container');
  const empty     = document.getElementById('empty');
  const count     = document.getElementById('count');

  count.textContent = books.length ? `${books.length} book${books.length !== 1 ? 's' : ''}` : '';

  if (!books.length) {
    container.innerHTML = '';
    empty.classList.remove('hidden');
    return;
  }
  empty.classList.add('hidden');

  if (_viewMode === 'grid') {
    container.className = 'book-grid-catalog';
    container.innerHTML = books.map(renderCard).join('');
  } else {
    container.className = 'book-list-catalog';
    container.innerHTML = books.map(renderRow).join('');
  }
}

function labelChipsHtml(labels) {
  if (!Array.isArray(labels) || !labels.length) return '';
  return `<div class="card-labels">${labels.map(l => `<span class="card-label">${escHtml(l)}</span>`).join('')}</div>`;
}

function badgeHtml(book) {
  const avail = book.availableCopies > 0;
  const cls   = avail ? 'badge-available' : 'badge-checked-out';
  const label = avail
    ? (book.totalCopies > 1 ? `Available (${book.availableCopies}/${book.totalCopies})` : 'Available')
    : 'Checked out';
  return `<span class="badge ${cls}">${label}</span>`;
}

function checkoutBtnHtml(book) {
  if (!_staffUser || book.availableCopies <= 0) return '';
  return `<button class="btn btn-primary btn-sm checkout-action-btn" data-id="${book.id}"
                  style="margin-top:0.375rem;">Check Out</button>`;
}

function renderCard(book) {
  const color   = placeholderColor(book.title);
  const initial = (book.title || '?')[0].toUpperCase();
  return `
    <div class="book-card-catalog" data-id="${book.id}">
      <div class="book-cover" style="background-color:${color}">
        <span class="book-cover-initial">${escHtml(initial)}</span>
        ${coverImgTag(book)}
      </div>
      <div class="book-card-body">
        <div class="book-card-title">${escHtml(book.title)}</div>
        <div class="book-card-author">${escHtml(book.author)}</div>
        ${labelChipsHtml(book.labels)}
        ${badgeHtml(book)}
        ${checkoutBtnHtml(book)}
      </div>
    </div>`;
}

function renderRow(book) {
  const color   = placeholderColor(book.title);
  const initial = (book.title || '?')[0].toUpperCase();
  return `
    <div class="book-row-catalog" data-id="${book.id}">
      <div class="book-row-thumb" style="background-color:${color}">
        ${escHtml(initial)}${coverImgTag(book)}
      </div>
      <div class="book-row-info">
        <div class="book-row-title">${escHtml(book.title)}</div>
        <div class="book-row-author">${escHtml(book.author)}</div>
        ${labelChipsHtml(book.labels)}
      </div>
      <div class="book-row-right">
        ${badgeHtml(book)}
        ${checkoutBtnHtml(book)}
      </div>
    </div>`;
}

// ── Card / row click ──────────────────────────────────────────────────────────
document.getElementById('book-container').addEventListener('click', (e) => {
  // Checkout button — open checkout modal directly
  const coBtn = e.target.closest('.checkout-action-btn');
  if (coBtn) {
    const book = _allBooks.find(b => b.id === coBtn.dataset.id);
    if (book) openCheckoutModal(book);
    return;
  }
  // Card / row — open detail modal
  const card = e.target.closest('[data-id]');
  if (!card) return;
  const book = _allBooks.find(b => b.id === card.dataset.id);
  if (book) openDetailModal(book);
});

// ── Book Detail Modal ─────────────────────────────────────────────────────────
const detailModal = document.getElementById('detail-modal');
initModalDismiss(detailModal);
document.getElementById('dm-close').addEventListener('click', () => closeModal(detailModal));
document.getElementById('dm-checkout-btn').addEventListener('click', () => {
  closeModal(detailModal);
  if (_currentBook) openCheckoutModal(_currentBook);
});

function openDetailModal(book) {
  _currentBook = book;
  populateDetailModal(book);
  openModal(detailModal);
}

function populateDetailModal(book) {
  const color    = placeholderColor(book.title);
  const initial  = (book.title || '?')[0].toUpperCase();
  const coverUrl = book.imageUrl
    || (book.isbn ? `https://covers.openlibrary.org/b/isbn/${encodeURIComponent(book.isbn)}-L.jpg` : null);

  const avail      = book.availableCopies > 0;
  const badgeCls   = avail ? 'badge-available' : 'badge-checked-out';
  const badgeLabel = avail
    ? (book.totalCopies > 1 ? `Available (${book.availableCopies} of ${book.totalCopies} copies)` : 'Available')
    : (book.totalCopies > 1 ? `All ${book.totalCopies} copies checked out` : 'Checked out');

  document.getElementById('dm-title').textContent   = book.title;
  document.getElementById('dm-author').textContent  = book.author;
  document.getElementById('dm-badge').innerHTML     = `<span class="badge ${badgeCls}">${badgeLabel}</span>`;
  document.getElementById('dm-isbn').textContent    = book.isbn ? `ISBN: ${book.isbn}` : '';
  document.getElementById('dm-labels').innerHTML    = Array.isArray(book.labels) && book.labels.length
    ? book.labels.map(l => `<span style="background:var(--color-gray-100);border:1px solid var(--color-gray-300);
        border-radius:9999px;padding:0.125rem 0.625rem;font-size:0.8125rem;">${escHtml(l)}</span>`).join('')
    : '';
  document.getElementById('dm-summary').textContent = book.summary || '';

  const coverEl = document.getElementById('dm-cover');
  coverEl.style.backgroundColor = color;
  coverEl.innerHTML = `
    <span style="font-size:2rem;font-weight:800;color:rgba(255,255,255,0.75);position:relative;z-index:0;">
      ${escHtml(initial)}
    </span>
    ${coverUrl ? `<img src="${escHtml(coverUrl)}" alt="${escHtml(book.title)}" onerror="this.remove()"
                      style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:1;" />` : ''}`;

  // Staff-only: checkout button + active checkouts
  const footer   = document.getElementById('dm-footer');
  const coBtn    = document.getElementById('dm-checkout-btn');
  const coSection = document.getElementById('dm-checkouts');

  if (_staffUser) {
    footer.hidden  = !avail;
    coBtn.disabled = false;
    coBtn.textContent = 'Check Out';
    coSection.hidden = false;
    loadAndRenderCheckouts(book);
  } else {
    footer.hidden    = true;
    coSection.hidden = true;
  }
}

async function loadAndRenderCheckouts(book) {
  const el = document.getElementById('dm-checkouts');
  if (book.availableCopies >= book.totalCopies) { el.innerHTML = ''; return; }

  el.innerHTML = `
    <div style="border-top:1px solid var(--color-gray-200); margin-top:1rem; padding-top:0.875rem;">
      <p style="font-weight:600; font-size:0.875rem; margin-bottom:0.5rem; color:var(--color-gray-700);">Currently checked out</p>
      <div id="dm-checkout-rows" style="display:flex;align-items:center;gap:0.5rem;">
        <span class="spinner spinner-sm"></span>
        <span class="text-muted" style="font-size:0.875rem;">Loading…</span>
      </div>
    </div>`;

  try {
    const checkouts = await getActiveCheckoutsForBook(book.id);
    const rowsEl = document.getElementById('dm-checkout-rows');
    if (!rowsEl) return;

    if (!checkouts.length) {
      rowsEl.innerHTML = '<p class="text-muted" style="font-size:0.875rem;">No active checkouts found.</p>';
      return;
    }

    rowsEl.innerHTML = checkouts.map(co => {
      const { label, cls } = getOverdueStatus(co.dueDate);
      return `
        <div style="display:flex;align-items:center;justify-content:space-between;
                    padding:0.5rem 0;border-bottom:1px solid var(--color-gray-100);gap:0.75rem;width:100%;">
          <div>
            <div style="font-weight:500;font-size:0.875rem;">${escHtml(co.studentName)}</div>
            <div style="font-size:0.8125rem;color:var(--color-gray-500);">
              ${escHtml(co.studentGrade)} · Due ${formatDate(co.dueDate)}
            </div>
          </div>
          <div style="display:flex;align-items:center;gap:0.5rem;flex-shrink:0;">
            <span class="badge ${cls}">${label}</span>
            <button class="btn btn-ghost btn-sm checkin-btn"
                    data-checkout-id="${co.id}"
                    data-student="${escHtml(co.studentName)}"
                    data-book-id="${book.id}">Check In</button>
          </div>
        </div>`;
    }).join('');
  } catch (err) {
    console.error(err);
    const rowsEl = document.getElementById('dm-checkout-rows');
    if (rowsEl) rowsEl.innerHTML = '<p class="text-danger" style="font-size:0.875rem;">Failed to load.</p>';
  }
}

// Check In from detail modal
document.getElementById('dm-checkouts').addEventListener('click', async (e) => {
  const btn = e.target.closest('.checkin-btn');
  if (!btn || btn.disabled) return;

  const { checkoutId, student, bookId } = btn.dataset;
  if (!confirm(`Confirm return from ${student}?`)) return;

  btn.disabled    = true;
  btn.textContent = '…';

  try {
    await checkinBook({ checkoutId, bookId });
    showToast('Book checked in!', 'success');
    loadAndRenderCheckouts(_currentBook);
  } catch (err) {
    console.error(err);
    showToast('Check-in failed. Try again.', 'error');
    btn.disabled    = false;
    btn.textContent = 'Check In';
  }
});

// ── Checkout Modal ────────────────────────────────────────────────────────────
const checkoutModal = document.getElementById('checkout-modal');
initModalDismiss(checkoutModal);
document.getElementById('cm-close').addEventListener('click',  () => closeModal(checkoutModal));
document.getElementById('cm-cancel').addEventListener('click', () => closeModal(checkoutModal));

function openCheckoutModal(book) {
  _currentBook     = book;
  _selectedStudent = null;
  _typeaheadHits   = [];

  document.getElementById('cm-book-name').textContent   = book.title;
  document.getElementById('cm-student-input').value     = '';
  document.getElementById('cm-student-dropdown').hidden = true;
  document.getElementById('cm-error').hidden            = true;
  document.getElementById('cm-confirm').disabled        = false;
  document.getElementById('cm-confirm').textContent     = 'Confirm Checkout';

  const due = new Date();
  due.setDate(due.getDate() + 14);
  document.getElementById('cm-due-date').value = due.toISOString().slice(0, 10);

  openModal(checkoutModal);
}

// ── Student typeahead ─────────────────────────────────────────────────────────
const studentInput    = document.getElementById('cm-student-input');
const studentDropdown = document.getElementById('cm-student-dropdown');

studentInput.addEventListener('input', () => {
  _selectedStudent = null;
  const term = studentInput.value.trim();
  if (term.length < 1) { studentDropdown.hidden = true; _typeaheadHits = []; return; }

  _typeaheadHits = searchStudents(term);
  if (!_typeaheadHits.length) { studentDropdown.hidden = true; return; }

  studentDropdown.innerHTML = _typeaheadHits.map((s, i) => `
    <div class="typeahead-item" data-index="${i}">
      ${escHtml(s.name)}<span class="text-muted"> · ${escHtml(s.grade)}</span>
    </div>`).join('');
  studentDropdown.hidden = false;
});

studentDropdown.addEventListener('mousedown', (e) => {
  e.preventDefault();
  const item = e.target.closest('.typeahead-item');
  if (!item) return;
  const s = _typeaheadHits[parseInt(item.dataset.index)];
  _selectedStudent          = s;
  studentInput.value        = `${s.name} · ${s.grade}`;
  studentDropdown.hidden    = true;
});

studentInput.addEventListener('blur', () => {
  setTimeout(() => { studentDropdown.hidden = true; }, 150);
});

// ── Confirm checkout ──────────────────────────────────────────────────────────
document.getElementById('cm-confirm').addEventListener('click', async () => {
  const errorEl    = document.getElementById('cm-error');
  const confirmBtn = document.getElementById('cm-confirm');
  errorEl.hidden   = true;

  if (!_selectedStudent) {
    errorEl.textContent = 'Please select a student from the list.';
    errorEl.hidden = false;
    studentInput.focus();
    return;
  }
  const dueDateStr = document.getElementById('cm-due-date').value;
  if (!dueDateStr) {
    errorEl.textContent = 'Please set a due date.';
    errorEl.hidden = false;
    return;
  }

  confirmBtn.disabled    = true;
  confirmBtn.textContent = 'Checking out…';

  try {
    await checkoutBook({
      book:    _currentBook,
      student: _selectedStudent,
      dueDate: Timestamp.fromDate(new Date(dueDateStr + 'T00:00:00')),
      user:    _staffUser,
    });
    closeModal(checkoutModal);
    showToast(`Checked out to ${_selectedStudent.name}`, 'success');
  } catch (err) {
    console.error(err);
    errorEl.textContent = 'Checkout failed. Please try again.';
    errorEl.hidden      = false;
    confirmBtn.disabled    = false;
    confirmBtn.textContent = 'Confirm Checkout';
  }
});
</script>

</body>
