<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Staff Login — Syro Library</title>
  <link rel="stylesheet" href="css/main.css" />

  <script type="importmap">
  {
    "imports": {
      "firebase/app":       "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js",
      "firebase/auth":      "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js",
      "firebase/firestore": "https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js"
    }
  }
  </script>
</head>
<body class="login-page">

  <div class="login-card">

    <!-- Logo -->
    <div class="login-logo">
      <div class="login-logo-box">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
          <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
        </svg>
      </div>
    </div>

    <h1 class="login-title">Staff Login</h1>
    <p class="login-subtitle">Syro Library · Volunteers &amp; Admins only</p>

    <!-- Loading -->
    <div id="loading" class="login-loading">
      <span class="spinner" aria-label="Loading"></span>
    </div>

    <!-- Sign-in button -->
    <div id="login-form" class="login-form" hidden>
      <button id="signin-btn" class="btn btn-google" type="button"
              style="font-size:0.8125rem; padding:0.4rem 0.9rem; gap:0.5rem;">
        <svg width="16" height="16" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 0 1-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/>
          <path d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/>
          <path d="M3.964 10.706A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.706V4.962H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.038l3.007-2.332z" fill="#FBBC05"/>
          <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.962L3.964 7.294C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
        </svg>
        Sign in with Google
      </button>
    </div>

    <!-- Error message -->
    <div id="error-box" class="login-error" hidden>
      <p id="error-msg"></p>
    </div>

    <!-- Back to catalog -->
    <div style="margin-top:1.25rem; text-align:center;">
      <a href="catalog.html" style="font-size:0.8125rem; color:var(--color-gray-400);">
        &larr; Back to catalog
      </a>
    </div>

  </div>

  <script type="module">
    import { initAuth, signInWithGoogle } from './js/auth.js';

    const loadingEl  = document.getElementById('loading');
    const formEl     = document.getElementById('login-form');
    const errorBoxEl = document.getElementById('error-box');
    const errorMsgEl = document.getElementById('error-msg');
    const signinBtn  = document.getElementById('signin-btn');

    initAuth({
      onAuthorized: () => {
        window.location.replace('dashboard.html');
      },
      onUnauthorized: (reason) => {
        loadingEl.hidden = true;
        formEl.hidden    = false;

        if (reason === 'no-access') {
          showError('Access denied. Ask your administrator to add your Google account.');
        } else if (reason === 'error') {
          showError('Something went wrong. Please try again.');
        }
      },
    });

    signinBtn.addEventListener('click', async () => {
      signinBtn.disabled = true;
      errorBoxEl.hidden  = true;

      try {
        await signInWithGoogle();
      } catch (err) {
        signinBtn.disabled = false;
        if (err.code === 'auth/popup-closed-by-user' ||
            err.code === 'auth/cancelled-popup-request') return;
        showError('Sign-in failed. Please try again.');
        console.error('Google sign-in error:', err);
      }
    });

    function showError(message) {
      errorMsgEl.textContent = message;
      errorBoxEl.hidden = false;
    }
  </script>

</body>
</html>
